<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dunk Line</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">

<meta name="generator" content="Construct 3">
	<meta name="author" content="DoonDookStudio">
	<meta name="description" content="DD Dunk Line">
	<link rel="manifest" href="appmanifest.json">
	<link rel="apple-touch-icon" sizes="128x128" href="icons/icon-64.png">
	<link rel="apple-touch-icon" sizes="256x256" href="icons/icon-256.png">
	<link rel="icon" type="image/png" href="icons/icon-256.png">

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  #tg-ad-layer {
    position: fixed;
    bottom: 16px;
    left: 16px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    pointer-events: none;
  }
  #tg-reward-btn {
    pointer-events: auto;
    font-size: 15px;
    padding: 10px 18px;
    background: linear-gradient(135deg, #00b4d8, #0096c7);
    color: #fff;
    border: none;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.5);
    cursor: pointer;
    display: none;
  }
  #tg-reward-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #tg-score-toast {
    pointer-events: none;
    font-size: 20px;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 0 0 8px #000;
    display: none;
    animation: floatUp 1.2s ease forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-60px); }
  }
</style>

</head>
<body>
<div id="fb-root"></div>

	<noscript>
		<div id="notSupportedWrap">
			<h2 id="notSupportedTitle">This content requires JavaScript</h2>
			<p class="notSupportedMessage">JavaScript appears to be disabled. Please enable it to view this content.</p>
		</div>
	</noscript>
	<script src="scripts/supportcheck.js"></script>
	<script src="scripts/offlineclient.js" type="module"></script>
	<script src="scripts/main.js" type="module"></script>
	<script src="scripts/register-sw.js" type="module"></script>

	<!-- Adsgram SDK -->
	<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

	<!-- Ad Layer -->
	<div id="tg-ad-layer">
		<div id="tg-score-toast">+200 pts</div>
		<button id="tg-reward-btn" onclick="tgShowRewardAd()">📺 Watch Ad +200 pts</button>
	</div>

	<script>
	(function () {
		window.Telegram && window.Telegram.WebApp && (
			window.Telegram.WebApp.ready(),
			window.Telegram.WebApp.expand()
		);

		var AdController = null;
		var IntAdController = null;

		// 从 ID.txt 读取广告 Block ID，格式：KEY=VALUE，每行一条
		function loadConfig(cb) {
			fetch('ID.txt?_=' + Date.now())
				.then(function (r) { return r.text(); })
				.then(function (text) {
					var cfg = {};
					text.split('\n').forEach(function (line) {
						var parts = line.trim().split('=');
						if (parts.length === 2) cfg[parts[0].trim()] = parts[1].trim();
					});
					cb(cfg);
				})
				.catch(function () { cb({}); });
		}

		function initAds(cfg) {
			if (!window.Adsgram) return;
			var rewardId = cfg['REWARD_BLOCK_ID'] || '';
			var intId    = cfg['INT_BLOCK_ID']    || '';
			try { if (rewardId) AdController    = window.Adsgram.init({ blockId: rewardId }); } catch(e) {}
			try { if (intId)    IntAdController = window.Adsgram.init({ blockId: intId });    } catch(e) {}

			document.getElementById('tg-reward-btn').style.display = 'block';
			startIntAdTimer();
		}

		function waitAndInit(cfg) {
			if (window.Adsgram) {
				initAds(cfg);
			} else {
				var sdkCheck = setInterval(function () {
					if (window.Adsgram) { clearInterval(sdkCheck); initAds(cfg); }
				}, 300);
			}
		}

		loadConfig(function (cfg) { waitAndInit(cfg); });

		// 激励广告：看完 +200 分
		window.tgShowRewardAd = function () {
			if (!AdController) return;
			var btn = document.getElementById('tg-reward-btn');
			btn.disabled = true;
			AdController.show().then(function () {
				if (typeof window.onAdsgramReward === 'function') {
					window.onAdsgramReward(200);
				}
				// 浮动提示
				var toast = document.getElementById('tg-score-toast');
				toast.style.display = 'block';
				toast.style.animation = 'none';
				setTimeout(function () {
					toast.style.animation = 'floatUp 1.2s ease forwards';
					setTimeout(function () { toast.style.display = 'none'; }, 1200);
				}, 20);
				// 60 秒冷却
				var cd = 60;
				btn.textContent = '⏳ ' + cd + 's';
				var cdTimer = setInterval(function () {
					cd--;
					if (cd <= 0) {
						clearInterval(cdTimer);
						btn.disabled = false;
						btn.textContent = '📺 Watch Ad +200 pts';
					} else {
						btn.textContent = '⏳ ' + cd + 's';
					}
				}, 1000);
			}).catch(function () {
				btn.disabled = false;
			});
		};

		// 插屏广告：每 30 秒自动弹出
		var intAdInterval = null;
		function startIntAdTimer() {
			intAdInterval = setInterval(function () {
				if (!IntAdController) return;
				IntAdController.show().then(function () {}).catch(function () {});
			}, 30000);
		}
	})();
	</script>

</body>
</html>
